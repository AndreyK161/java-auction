services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - "${POSTGRES_VOLUME_PATH}/postgres_data:/var/lib/postgresql/data"
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"
    networks:
      - app-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "${SMTP_PORT:-1025}:${SMTP_PORT:-1025}"
      - "${SMTP_UI_PORT:-8025}:${SMTP_UI_PORT:-8025}"
    networks:
      - app-network

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    ports:
      - "${MINIO_API_PORT:-9000}:${MINIO_API_PORT:-9000}"
      - "${MINIO_WEBUI_PORT:-9001}:${MINIO_WEBUI_PORT:-9001}"
    volumes:
      - "${MINIO_VOLUME:-.appstorage/.minio-data}:/data"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-miniouser}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniopassword}
    command: server --console-address ":9001" /data
    networks:
      - app-network

  jmeter:
    image: justb4/jmeter:latest
    container_name: jmeter
    depends_on:
      - postgres
    volumes:
      - ./stress-test.jmx:/stress-test.jmx
      - ./jmeter_results:/results
    entrypoint: >
      sh -c "jmeter -n -t /stress-test.jmx -l /results/result.jtl"
    environment:
      - TARGET_HOST=${TARGET_HOST}
      - TARGET_PORT=${TARGET_PORT}

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_EXTERNAL_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_UI_EXTERNAL_PORT}:15672"
    volumes:
      - "${RABBITMQ_VOLUME_PATH}/rabbitmq_data:/var/lib/rabbitmq"

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    volumes:
      - ./openapi.yaml:/app/openapi.yaml
    environment:
      SWAGGER_JSON: /app/openapi.yaml

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.4
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${POSTGRES_KC_SCHEMA}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: ${POSTGRES_KC_SCHEMA}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8082:8080"
    depends_on:
      - postgres
    networks:
      - app-network
networks:
  app-network:
    driver: bridge